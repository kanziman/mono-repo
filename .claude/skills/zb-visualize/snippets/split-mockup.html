<h2><!-- 비교 제목 --></h2>
<p class="subtitle"><!-- 두 안의 차이를 직접 확인하세요 --></p>

<div class="options mb-3" data-multiselect="false">
  <div class="option" data-choice="left" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content"><h3><!-- 왼쪽 안 제목 --></h3><p><!-- 한 줄 설명 --></p></div>
  </div>
  <div class="option" data-choice="right" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content"><h3><!-- 오른쪽 안 제목 --></h3><p><!-- 한 줄 설명 --></p></div>
  </div>
</div>

<div class="split">

  <div>
    <div class="mockup">
      <div class="mockup-header">안 A — <!-- 레이아웃 설명 --></div>
      <div class="mockup-body">
        <!-- 왼쪽 UI 묘사: mock-nav, mock-sidebar, mock-content 등 조합 -->
        <div class="mock-tabs mb-2">
          <div class="mock-tab active"><!-- 탭 1 --></div>
          <div class="mock-tab"><!-- 탭 2 --></div>
        </div>
        <div class="placeholder"><!-- 주요 컨텐츠 영역 묘사 --></div>
      </div>
    </div>
  </div>

  <div>
    <div class="mockup">
      <div class="mockup-header">안 B — <!-- 레이아웃 설명 --></div>
      <div class="mockup-body">
        <!-- 오른쪽 UI 묘사 -->
        <div class="mock-nav mb-2">
          <span class="mock-nav-brand"><!-- 브랜드 --></span>
          <span class="mock-nav-item active"><!-- 메뉴 --></span>
        </div>
        <div class="placeholder"><!-- 주요 컨텐츠 영역 묘사 --></div>
      </div>
    </div>
  </div>

</div>

<div class="callout callout-info mt-2">
  <strong>어떤 안이 더 자연스러운가요?</strong>
  위 선택지(A/B)를 클릭한 뒤 터미널에서 의견을 알려주세요.
</div>
